<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registration Form</title>
  <link rel="stylesheet" href="/Style/style.css" />
</head>
<body>
  <div class="container">
    <div class="form-wrapper">
      <h1>Registration Form</h1>

      <form id="registerForm">
        <!-- First Name, Last Name, Department Row -->
        <div class="row">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" placeholder="" required />
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" placeholder="" required />
          </div>
          <div class="form-group">
            <label for="department">Department</label>
            <select id="department" required>
              <option value="Computer Science" selected>Computer Science</option>
              <option value="Information Technology">Information Technology</option>
              <option value="Software Engineering">Software Engineering</option>
              <option value="Data Science">Data Science</option>
            </select>
          </div>
        </div>

        <!-- Gender, Hobbies, Others Row -->
        <div class="row two-column">
          <!-- Gender -->
          <div class="form-group">
            <label>Gender</label>
            <div class="options">
              <label class="option">
                <input type="radio" name="gender" value="Male" required>
                Male
              </label>
              <label class="option">
                <input type="radio" name="gender" value="Female">
                Female
              </label>
              <label class="option">
                <input type="radio" name="gender" value="Other">
                Other
              </label>
            </div>
          </div>

          <!-- Hobbies -->
          <div class="form-group">
            <label>Hobbies</label>
            <div class="options">
              <label class="option">
                <input type="checkbox" id="reading"> Reading
              </label>
              <label class="option">
                <input type="checkbox" id="sports"> Sports
              </label>
              <label class="option">
                <input type="checkbox" id="music"> Music
              </label>
              <label class="option">
                <input type="checkbox" id="travel"> Travel
              </label>
            </div>
          </div>
        </div>

        <!-- Others Textarea -->
        <div class="form-group full-width">
          <label for="others">Others</label>
          <textarea id="others" rows="5" placeholder=""></textarea>
        </div>

        <!-- Buttons -->
        <div class="buttons">
          <button type="button" class="btn btn-primary" onclick="handleRegister()">Register</button>
          <button type="button" class="btn btn-danger" onclick="clearForm('registerForm')">Clear</button>
        </div>
      </form>

      <div class="link">
        Already have an account? <a href="LoginPage.html">Login here</a>
      </div>
    </div>
  </div>

  <script src="/Script/script.js"></script>
</body>
</html>
